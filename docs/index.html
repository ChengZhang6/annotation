<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDCF Annotation</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f5f6f7;
      --panel: #ffffff;
      --text: #202327;
      --muted: #66717d;
      --line: #d7dde3;
      --line-strong: #aeb7c0;
      --green: #176b57;
      --green-soft: #e0f2ed;
      --blue: #2458a6;
      --amber: #a05a00;
      --red: #b42318;
      --shadow: 0 10px 28px rgba(32, 35, 39, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--green);
      color: var(--green);
    }

    button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #ffffff;
    }

    button.primary:hover {
      background: #105241;
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 88, 166, 0.16);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      background: #eef1f4;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .status.ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .status.error {
      background: #fee2e2;
      color: var(--red);
    }

    .shell {
      width: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 14px;
    }

    .panel-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .nav-grid .wide {
      grid-column: 1 / -1;
    }

    .hidden {
      display: none !important;
    }

    .message {
      border: 1px solid var(--line);
      border-left: 4px solid var(--amber);
      border-radius: 8px;
      background: #fff9ed;
      color: #6e3f00;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .checkline input {
      width: 17px;
      height: 17px;
      accent-color: var(--amber);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafb;
      color: var(--muted);
      font-size: 12px;
      z-index: 1;
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
    }

    .roster-row {
      cursor: pointer;
    }

    .roster-row:hover {
      background: var(--green-soft);
    }

    .roster-row.active {
      background: var(--green-soft);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .link-cell {
      max-width: 360px;
      overflow-wrap: anywhere;
    }

    .viewer-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 1fr);
      gap: 12px;
      padding: 14px;
    }

    .viewer-pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(680px, calc(100vh - 190px));
      gap: 8px;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
    }

    .viewer-title {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-toolbar a {
      color: var(--green);
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
      white-space: nowrap;
    }

    .viewer-toolbar a:hover {
      text-decoration: underline;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    @media (max-width: 860px) {
      .topbar,
      .shell {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions button,
      .toolbar button {
        flex: 1 1 auto;
      }

      .shell {
        padding: 12px;
      }

      .grid-two {
        grid-template-columns: 1fr;
      }

      .viewer-grid {
        grid-template-columns: 1fr;
      }

      .viewer-pane {
        grid-template-rows: auto 520px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>CDCF Annotation</h1>
      <div class="subtle">Google login writes to the shared spreadsheet.</div>
    </div>
    <div class="actions">
      <span id="status" class="status">Not connected</span>
      <button id="sign-in" class="primary" type="button">Sign in with Google</button>
    </div>
  </header>

  <main class="shell">
    <aside class="panel">
      <h2>Google Sheet</h2>
      <div class="panel-body">
        <input id="client-id" class="hidden" autocomplete="off">
        <input id="spreadsheet-id" class="hidden" autocomplete="off">
        <input id="roster-tab-name" class="hidden" autocomplete="off">
        <input id="form-url" class="hidden" autocomplete="off">
        <div class="toolbar">
          <button id="load-roster" type="button">Load roster</button>
        </div>
        <label>
          Article
          <select id="article-select"></select>
        </label>
        <label>
          Jump to articleID
          <input id="jump-id" autocomplete="off" placeholder="A050">
        </label>
        <div class="nav-grid">
          <button id="nav-prev10" type="button">-10</button>
          <button id="nav-next10" type="button">+10</button>
          <button id="nav-prev" type="button">Prev</button>
          <button id="nav-next" type="button">Next</button>
          <button id="jump-go" class="primary wide" type="button">Go</button>
        </div>
        <div id="article-position" class="subtle">No roster loaded</div>
        <div id="message" class="message">Sign in, then load the article roster.</div>
      </div>
    </aside>

    <section class="panel">
      <h2>Article + Annotation Form</h2>
      <div class="viewer-grid">
        <div class="viewer-pane">
          <div class="viewer-toolbar">
            <div id="article-frame-title" class="viewer-title">Select an article from the roster</div>
            <a id="article-open-link" href="#" target="_blank" rel="noreferrer">Open article</a>
          </div>
          <iframe id="article-frame" title="Article viewer"></iframe>
        </div>
        <div class="viewer-pane">
          <div class="viewer-toolbar">
            <div class="viewer-title">Google Form</div>
            <a id="form-open-link" href="#" target="_blank" rel="noreferrer">Open form</a>
          </div>
          <iframe id="form-frame" title="Google annotation form"></iframe>
        </div>
      </div>
    </section>
  </main>

  <script>
    const OAUTH_CLIENT_ID = "851780710057-jilmd0lqqm402i2gsnpf9o5t3plf1vkr.apps.googleusercontent.com";
    const SPREADSHEET_ID = "1gNt24it0OKAaxJJb-pyXDtpd0PmfT3H1irdJUk-lPEk";
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdqQa1bmu-sLxzmfuK5-e0Jf83uIIXLZJPaWsngEUJ6alXTqw/viewform?usp=header";
    const STORAGE_KEY = "cdcf-simple-config";
    const SCOPE = "https://www.googleapis.com/auth/spreadsheets";
    let accessToken = "";
    let tokenClient = null;
    let authRequestMode = "manual";
    let rosterRows = [];
    let currentRosterIndex = -1;

    const els = {};
    [
      "status",
      "sign-in",
      "client-id",
      "spreadsheet-id",
      "roster-tab-name",
      "form-url",
      "load-roster",
      "article-select",
      "jump-id",
      "jump-go",
      "nav-prev10",
      "nav-prev",
      "nav-next",
      "nav-next10",
      "article-position",
      "message",
      "article-frame-title",
      "article-open-link",
      "article-frame",
      "form-open-link",
      "form-frame"
    ].forEach((id) => {
      els[id] = document.getElementById(id);
    });

    init();

    function init() {
      const config = loadConfig();
      els["client-id"].value = config.clientId || OAUTH_CLIENT_ID;
      els["spreadsheet-id"].value = config.spreadsheetId || SPREADSHEET_ID;
      els["roster-tab-name"].value = config.rosterTabName || "article_roster";
      els["form-url"].value = config.formUrl || FORM_URL;

      els["sign-in"].addEventListener("click", signIn);
      els["load-roster"].addEventListener("click", loadRosterRows);
      els["article-select"].addEventListener("change", () => selectArticleByIndex(Number(els["article-select"].value), true));
      els["jump-go"].addEventListener("click", jumpToArticle);
      els["jump-id"].addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          jumpToArticle();
        }
      });
      els["nav-prev10"].addEventListener("click", () => moveArticle(-10));
      els["nav-prev"].addEventListener("click", () => moveArticle(-1));
      els["nav-next"].addEventListener("click", () => moveArticle(1));
      els["nav-next10"].addEventListener("click", () => moveArticle(10));
      showArticlePlaceholder();
      loadFormFrame();
      window.setTimeout(trySilentSignIn, 600);
    }

    function loadConfig() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveConfig() {
      const config = currentConfig();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      tokenClient = null;
      showMessage("Config saved in this browser.", "ok");
    }

    function currentConfig() {
      return {
        clientId: els["client-id"].value.trim(),
        spreadsheetId: els["spreadsheet-id"].value.trim() || SPREADSHEET_ID,
        rosterTabName: els["roster-tab-name"].value.trim() || "article_roster",
        formUrl: els["form-url"].value.trim() || FORM_URL
      };
    }

    function signIn() {
      requestGoogleToken("manual");
    }

    function requestGoogleToken(mode) {
      const config = currentConfig();
      if (!config.clientId) {
        if (mode === "manual") {
          showMessage("Google sign-in is not configured correctly.", "error");
        }
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        if (mode === "manual") {
          showMessage("Google Identity Services did not load. Open this page from GitHub Pages or localhost.", "error");
        }
        return;
      }
      authRequestMode = mode;
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: config.clientId,
          scope: SCOPE,
          callback: (response) => {
            if (response.error) {
              if (authRequestMode === "manual") {
                showMessage(response.error, "error");
              } else {
                els.status.textContent = "Not connected";
                els.status.className = "status";
                showMessage("Sign in when you are ready to connect Google Sheets.", "warn");
              }
              return;
            }
            accessToken = response.access_token;
            els.status.textContent = "Connected";
            els.status.className = "status ok";
            const message = authRequestMode === "silent"
              ? "Google sign-in restored. You can read and write the shared sheet."
              : "Signed in. Google will use this user's permission to write the sheet.";
            showMessage(message, "ok");
          }
        });
      }
      const prompt = mode === "silent" || accessToken ? "" : "consent";
      tokenClient.requestAccessToken({ prompt });
    }

    function trySilentSignIn() {
      const startedAt = Date.now();
      const timer = window.setInterval(() => {
        if (accessToken) {
          window.clearInterval(timer);
          return;
        }
        if (window.google && google.accounts && google.accounts.oauth2) {
          window.clearInterval(timer);
          requestGoogleToken("silent");
          return;
        }
        if (Date.now() - startedAt > 5000) {
          window.clearInterval(timer);
        }
      }, 250);
    }

    async function loadRosterRows() {
      try {
        requireToken();
        const config = currentConfig();
        const data = await sheetsFetch(`/values/${encodeURIComponent(`${quoteSheet(config.rosterTabName)}!A1:Z500`)}`);
        const rows = data.values || [];
        rosterRows = parseRosterRows(rows);
        renderRosterOptions();
        if (rosterRows.length) {
          selectArticleByIndex(0, false);
        }
        showMessage(`Loaded ${rosterRows.length} article roster row(s).`, "ok");
      } catch (error) {
        showMessage(error.message, "error");
      }
    }

    async function sheetsFetch(path, options = {}) {
      const config = currentConfig();
      const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${config.spreadsheetId}${path}`, {
        ...options,
        headers: {
          Authorization: `Bearer ${accessToken}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      const body = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(body.error && body.error.message ? body.error.message : response.statusText);
      }
      return body;
    }

    function parseRosterRows(rows) {
      if (!rows.length) {
        return [];
      }
      const headers = rows[0].map(normalizeHeader);
      const idIndex = findHeaderIndex(headers, ["articleid", "article_id", "id"]);
      const titleIndex = findHeaderIndex(headers, ["article_title", "title", "articletitle"]);
      const linkIndex = findHeaderIndex(headers, ["link_to_article", "article_link", "link", "url"]);

      return rows.slice(1)
        .filter((row) => row.some((cell) => String(cell || "").trim()))
        .map((row) => ({
          id: row[idIndex] || "",
          title: row[titleIndex] || "",
          link: row[linkIndex] || ""
        }));
    }

    function renderRosterOptions() {
      els["article-select"].innerHTML = rosterRows.map((row, index) => {
        const labelParts = [row.id, row.title].filter(Boolean);
        return `<option value="${index}">${escapeHtml(labelParts.join(" - ") || `Article ${index + 1}`)}</option>`;
      }).join("");
      updateArticlePosition();
    }

    function selectArticleByIndex(index, openExternal = false) {
      if (!rosterRows.length) {
        showMessage("Load roster first.", "warn");
        return;
      }
      const requestedIndex = Number.isFinite(index) ? index : 0;
      const boundedIndex = Math.max(0, Math.min(rosterRows.length - 1, requestedIndex));
      const article = rosterRows[boundedIndex];
      currentRosterIndex = boundedIndex;
      els["article-select"].value = String(boundedIndex);
      els["jump-id"].value = article.id || "";
      loadArticleFrame(article.link, article.title || article.id, openExternal);
      updateArticlePosition();
    }

    function jumpToArticle() {
      const target = normalizeArticleId(els["jump-id"].value);
      const index = rosterRows.findIndex((row) => normalizeArticleId(row.id) === target);
      if (index === -1) {
        showMessage(`Article not found: ${els["jump-id"].value}`, "error");
        return;
      }
      selectArticleByIndex(index, true);
    }

    function moveArticle(delta) {
      if (!rosterRows.length) {
        showMessage("Load roster first.", "warn");
        return;
      }
      const baseIndex = currentRosterIndex === -1 ? 0 : currentRosterIndex;
      selectArticleByIndex(baseIndex + delta, true);
    }

    function updateArticlePosition() {
      if (!rosterRows.length || currentRosterIndex === -1) {
        els["article-position"].textContent = rosterRows.length ? `${rosterRows.length} articles loaded` : "No roster loaded";
        return;
      }
      const article = rosterRows[currentRosterIndex];
      els["article-position"].textContent = `${currentRosterIndex + 1} / ${rosterRows.length}  ${article.id || ""}`;
    }

    function loadArticleFrame(link, title, openExternal = false) {
      if (!link) {
        showMessage("This roster row has no article link.", "warn");
        return;
      }
      els["article-frame"].removeAttribute("srcdoc");
      els["article-frame-title"].textContent = title || link;
      els["article-open-link"].href = link;
      els["article-frame"].src = link;
      if (openExternal) {
        window.open(link, "cdcf_article_window", "noopener");
      }
      showMessage(`Selected article: ${title || link}. If the embedded page is blocked, use the article window or Open article.`, "ok");
    }

    function showArticlePlaceholder() {
      els["article-frame"].src = "about:blank";
      els["article-frame"].srcdoc = `
        <!doctype html>
        <html>
          <body style="margin:0;font:14px system-ui,sans-serif;color:#66717d;background:#fff;">
            <div style="height:100vh;display:grid;place-items:center;text-align:center;padding:24px;">
              <div>
                <strong style="display:block;color:#202327;margin-bottom:8px;">No article selected</strong>
                Sign in, click Load roster, then choose an article row.
              </div>
            </div>
          </body>
        </html>
      `;
    }

    function loadFormFrame() {
      const config = currentConfig();
      const formUrl = normalizeFormUrl(config.formUrl);
      els["form-open-link"].href = config.formUrl;
      els["form-frame"].src = formUrl;
    }

    function requireToken() {
      if (!accessToken) {
        throw new Error("Sign in with Google first.");
      }
    }

    function showMessage(message, level) {
      els.message.textContent = message;
      els.message.style.borderLeftColor = level === "ok" ? "var(--green)" : level === "error" ? "var(--red)" : "var(--amber)";
      if (level === "error") {
        els.status.textContent = "Setup needed";
        els.status.className = "status error";
      }
    }

    function quoteSheet(name) {
      return `'${String(name).replace(/'/g, "''")}'`;
    }

    function normalizeHeader(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function normalizeArticleId(value) {
      const raw = String(value || "").trim().toUpperCase();
      const match = raw.match(/^A?0*(\d+)$/);
      if (match) {
        return `A${match[1].padStart(3, "0")}`;
      }
      return raw;
    }

    function findHeaderIndex(headers, candidates) {
      for (const candidate of candidates) {
        const index = headers.indexOf(candidate);
        if (index !== -1) {
          return index;
        }
      }
      return -1;
    }

    function normalizeFormUrl(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname === "docs.google.com" && parsed.pathname.includes("/forms/")) {
          parsed.searchParams.set("embedded", "true");
        }
        return parsed.toString();
      } catch {
        return url;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
