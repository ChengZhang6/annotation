<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDCF Annotation</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">CDCF</div>
      <div class="mode-switch" role="tablist" aria-label="Mode">
        <button id="mode-annotation" class="mode-button active" type="button" role="tab" aria-selected="true">Annotation</button>
        <button id="mode-discussion" class="mode-button" type="button" role="tab" aria-selected="false">Discussion</button>
      </div>
    </div>
    <div class="controlbar" aria-label="Article roster controls">
      <input id="client-id" class="hidden" autocomplete="off">
      <input id="spreadsheet-id" class="hidden" autocomplete="off">
      <input id="roster-tab-name" class="hidden" autocomplete="off">
      <input id="form-url" class="hidden" autocomplete="off">
      <button id="nav-prev" class="icon-button" type="button" aria-label="Previous article" title="Previous article">
        <span class="nav-icon" aria-hidden="true">&lsaquo;</span>
      </button>
      <label class="control-field">
        <span class="visually-hidden">Article</span>
        <select id="article-select"></select>
      </label>
      <button id="nav-next" class="icon-button" type="button" aria-label="Next article" title="Next article">
        <span class="nav-icon" aria-hidden="true">&rsaquo;</span>
      </button>
      <label class="control-field">
        <span class="visually-hidden">articleID</span>
        <input id="jump-id" autocomplete="off" placeholder="A050">
      </label>
      <button id="jump-go" class="primary icon-button" type="button" aria-label="Go to articleID" title="Go to articleID">
        <span class="nav-icon" aria-hidden="true">&crarr;</span>
      </button>
      <div id="article-position" class="hidden">No roster loaded</div>
    </div>
    <div class="actions">
      <span id="status" class="status">Not connected</span>
      <button id="sign-in" class="primary icon-button" type="button" aria-label="Sign in with Google" title="Sign in with Google">
        <span class="google-mark" aria-hidden="true">G</span>
      </button>
    </div>
  </header>

  <main class="shell">
    <section class="workspace">
      <div class="viewer-grid">
        <div class="viewer-pane">
          <div class="viewer-toolbar article-toolbar">
            <div class="article-meta">
              <div id="article-frame-title" class="viewer-title">Select an article from the roster</div>
              <div id="article-frame-link" class="viewer-title article-url"></div>
            </div>
            <div class="viewer-actions">
              <button id="article-refresh" class="link-button" type="button">Refresh article</button>
              <button id="case-copy-id" class="link-button" type="button">Copy caseID</button>
              <button id="article-copy-link" class="link-button" type="button">Copy link</button>
              <a id="article-open-link" href="#" target="_blank" rel="noreferrer">Open article</a>
            </div>
          </div>
          <div id="article-frame-wrap" class="zoom-box">
            <iframe id="article-frame" class="tab-panel" title="Article viewer"></iframe>
            <div class="zoom-controls" aria-label="Article zoom">
              <button id="article-zoom-out" type="button" aria-label="Zoom article out">-</button>
              <button id="article-zoom-reset" class="zoom-readout" type="button" aria-label="Reset article zoom">100%</button>
              <button id="article-zoom-in" type="button" aria-label="Zoom article in">+</button>
            </div>
          </div>
          <div id="editor-panel" class="tab-panel editor-panel hidden">
            <textarea id="clean-text-editor" class="editor-textarea" autocomplete="off" spellcheck="true" placeholder="Paste and edit clean text here"></textarea>
            <div class="zoom-controls" aria-label="Editor zoom">
              <button id="editor-zoom-out" type="button" aria-label="Zoom editor out">-</button>
              <button id="editor-zoom-reset" class="zoom-readout" type="button" aria-label="Reset editor zoom">100%</button>
              <button id="editor-zoom-in" type="button" aria-label="Zoom editor in">+</button>
            </div>
          </div>
        </div>
        <button id="pane-divider" class="pane-divider" type="button" aria-label="Resize panes" title="Drag to resize panes"></button>
        <div class="viewer-pane">
          <div class="viewer-toolbar compact">
            <div class="pane-tabs" role="tablist" aria-label="Right pane">
              <button id="tab-preview" class="tab-button active" type="button" role="tab" aria-controls="preview-frame-wrap">Article Preview</button>
              <button id="tab-form" class="tab-button" type="button" role="tab" aria-controls="form-frame">Google Form</button>
            </div>
            <div class="viewer-actions">
              <button id="preview-fit" class="tab-button active" type="button" aria-pressed="true" title="Toggle article preview fit">Fit</button>
              <a id="form-open-link" href="#" target="_blank" rel="noreferrer">Open form</a>
            </div>
          </div>
          <div id="right-content" class="right-content">
            <div id="preview-frame-wrap" class="zoom-box tab-panel">
              <iframe id="preview-frame" title="Article preview"></iframe>
            </div>
            <iframe id="form-frame" class="tab-panel hidden" title="Google annotation form"></iframe>
            <div id="discussion-panel" class="tab-panel discussion-panel hidden">
              <div id="discussion-filter-bar" class="discussion-filter-bar hidden" aria-label="Discussion filters">
                <button id="discussion-filter-all" class="active" type="button" data-filter="all">All</button>
                <button id="discussion-filter-diff" type="button" data-filter="diff">Diff</button>
                <button id="discussion-filter-flag" type="button" data-filter="flag">Flag</button>
              </div>
              <div id="discussion-empty" class="discussion-empty">Sign in to load discussion cases.</div>
              <div id="discussion-manual-card" class="diff-card hidden">
                <label>
                  Attribute
                  <select id="manual-attribute-select"></select>
                </label>
                <label>
                  Discussion / final notes
                  <textarea id="manual-discussion-note" autocomplete="off" spellcheck="true"></textarea>
                </label>
                <button id="manual-discussion-save" class="primary" type="button">Save</button>
              </div>
              <div id="discussion-diff-card" class="diff-card hidden">
                <div class="diff-nav" aria-label="Diff navigation">
                  <button id="diff-prev" type="button" aria-label="Previous diff">&lsaquo;</button>
                  <div id="diff-count" class="diff-count">0 / 0</div>
                  <button id="diff-next" type="button" aria-label="Next diff">&rsaquo;</button>
                </div>
                <div id="diff-attribute" class="diff-attribute"></div>
                <div id="diff-source" class="diff-source"></div>
                <div class="answer-grid">
                  <div id="cheng-answer" class="answer-box"><strong>Cheng</strong></div>
                  <div id="briana-answer" class="answer-box"><strong>Briana</strong></div>
                </div>
                <label>
                  Discussion / final notes
                  <textarea id="discussion-note" autocomplete="off" spellcheck="true" placeholder="Enter discussion note or final decision." disabled></textarea>
                </label>
                <div class="discussion-actions">
                  <button id="discussion-save" class="primary" type="button" disabled>Save</button>
                  <button id="discussion-resolve-flag" type="button" disabled>Resolve flag</button>
                </div>
              </div>
            </div>
            <div class="zoom-controls" aria-label="Right pane zoom">
              <button id="right-zoom-out" type="button" aria-label="Zoom right pane out">-</button>
              <button id="right-zoom-reset" class="zoom-readout" type="button" aria-label="Reset right pane zoom">100%</button>
              <button id="right-zoom-in" type="button" aria-label="Zoom right pane in">+</button>
            </div>
          </div>
        </div>
        <button id="review-pane-divider" class="pane-divider review-pane-divider" type="button" aria-label="Resize case review pane" title="Drag to resize case review"></button>
        <div id="case-review-pane" class="viewer-pane case-review-pane">
          <section class="case-review-panel" aria-label="Case review">
            <div class="case-review-header">
              <span>Case Review</span>
            </div>
            <input id="case-review-case-id" type="hidden" autocomplete="off">
            <div class="case-picker" aria-label="Case selector">
              <label>
                Case
                <select id="case-review-case-select"></select>
              </label>
              <button id="case-review-add-case" type="button" title="Use next case ID">+C</button>
            </div>
            <div id="case-review-flags" class="case-review-list">
              <div class="case-review-empty">No flags loaded</div>
            </div>
            <div id="case-review-note-panel" class="case-review-note-panel">
              <div class="case-review-note-header">
                <span>Notes</span>
                <span id="case-review-note-attribute">Select an attribute</span>
              </div>
              <textarea id="case-review-note" autocomplete="off" spellcheck="true" placeholder="Click an attribute above to write a note." disabled></textarea>
              <button id="case-review-note-save" class="primary" type="button" disabled>Save note</button>
            </div>
          </section>
          <section id="discussion-edit-panel" class="discussion-edit-panel" aria-label="Edit response">
            <div class="discussion-edit-header">
              <span id="discussion-edit-title">Edit Response</span>
              <a id="discussion-edit-open" href="#" target="_blank" rel="noreferrer" aria-disabled="true">Open edit response</a>
            </div>
            <div id="discussion-edit-empty" class="discussion-edit-empty">Select a discussion case.</div>
            <iframe id="discussion-edit-frame" class="hidden" title="Edit Google Form response"></iframe>
          </section>
        </div>
      </div>
    </section>
  </main>

  <div id="message" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
