<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDCF Annotation</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f5f6f7;
      --panel: #ffffff;
      --text: #202327;
      --muted: #66717d;
      --line: #d7dde3;
      --line-strong: #aeb7c0;
      --green: #176b57;
      --green-soft: #e0f2ed;
      --blue: #2458a6;
      --amber: #a05a00;
      --red: #b42318;
      --shadow: 0 10px 28px rgba(32, 35, 39, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--green);
      color: var(--green);
    }

    button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #ffffff;
    }

    button.primary:hover {
      background: #105241;
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 88, 166, 0.16);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      background: #eef1f4;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .status.ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .status.error {
      background: #fee2e2;
      color: var(--red);
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 14px;
    }

    .panel-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .message {
      border: 1px solid var(--line);
      border-left: 4px solid var(--amber);
      border-radius: 8px;
      background: #fff9ed;
      color: #6e3f00;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .checkline input {
      width: 17px;
      height: 17px;
      accent-color: var(--amber);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafb;
      color: var(--muted);
      font-size: 12px;
      z-index: 1;
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
    }

    @media (max-width: 860px) {
      .topbar,
      .shell {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions button,
      .toolbar button {
        flex: 1 1 auto;
      }

      .shell {
        padding: 12px;
      }

      .grid-two {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>CDCF Annotation</h1>
      <div class="subtle">Google login writes to the shared spreadsheet.</div>
    </div>
    <div class="actions">
      <span id="status" class="status">Not connected</span>
      <button id="save-config" type="button">Save config</button>
      <button id="sign-in" class="primary" type="button">Sign in with Google</button>
    </div>
  </header>

  <main class="shell">
    <aside class="panel">
      <h2>Google Sheet</h2>
      <div class="panel-body">
        <label>
          OAuth client ID
          <input id="client-id" autocomplete="off" placeholder="123...apps.googleusercontent.com">
        </label>
        <label>
          Spreadsheet ID
          <input id="spreadsheet-id" autocomplete="off">
        </label>
        <label>
          Write tab
          <input id="tab-name" autocomplete="off">
        </label>
        <div class="toolbar">
          <button id="prepare-tab" type="button">Prepare tab</button>
          <button id="load-recent" type="button">Load recent</button>
        </div>
        <div id="message" class="message">Add the OAuth client ID, then sign in. The spreadsheet ID is already filled from your link.</div>
      </div>
    </aside>

    <section class="panel">
      <h2>Annotation Row</h2>
      <div class="panel-body">
        <form id="annotation-form">
          <div class="grid-two">
            <label>
              Article link
              <input id="article-link" autocomplete="off">
            </label>
            <label>
              Question
              <input id="question" autocomplete="off">
            </label>
          </div>
          <label>
            Clean text
            <textarea id="clean-text"></textarea>
          </label>
          <div class="grid-two">
            <label>
              Answer
              <textarea id="answer"></textarea>
            </label>
            <label>
              Evidence
              <textarea id="evidence"></textarea>
            </label>
          </div>
          <label>
            Notes
            <textarea id="notes"></textarea>
          </label>
          <div class="toolbar">
            <label class="checkline">
              <input id="starred" type="checkbox">
              Star
            </label>
            <button id="submit-row" class="primary" type="submit">Append row</button>
            <button id="clear-form" type="button">Clear</button>
          </div>
        </form>
      </div>
    </section>

    <section class="panel" style="grid-column: 1 / -1;">
      <h2>Recent Rows</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Article</th>
              <th>Question</th>
              <th>Answer</th>
              <th>Evidence</th>
              <th>Notes</th>
              <th>Star</th>
            </tr>
          </thead>
          <tbody id="recent-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const OAUTH_CLIENT_ID = "851780710057-jilmd0lqqm402i2gsnpf9o5t3plf1vkr.apps.googleusercontent.com";
    const SPREADSHEET_ID = "1gNt24it0OKAaxJJb-pyXDtpd0PmfT3H1irdJUk-lPEk";
    const STORAGE_KEY = "cdcf-simple-config";
    const SCOPE = "https://www.googleapis.com/auth/spreadsheets";
    const HEADERS = ["timestamp", "article_link", "clean_text", "question", "answer", "evidence", "notes", "starred", "user_note"];

    let accessToken = "";
    let tokenClient = null;

    const els = {};
    [
      "status",
      "save-config",
      "sign-in",
      "client-id",
      "spreadsheet-id",
      "tab-name",
      "prepare-tab",
      "load-recent",
      "message",
      "annotation-form",
      "article-link",
      "clean-text",
      "question",
      "answer",
      "evidence",
      "notes",
      "starred",
      "clear-form",
      "recent-rows"
    ].forEach((id) => {
      els[id] = document.getElementById(id);
    });

    init();

    function init() {
      const config = loadConfig();
      els["client-id"].value = config.clientId || OAUTH_CLIENT_ID;
      els["spreadsheet-id"].value = config.spreadsheetId || SPREADSHEET_ID;
      els["tab-name"].value = config.tabName || "Annotations";

      els["save-config"].addEventListener("click", saveConfig);
      els["sign-in"].addEventListener("click", signIn);
      els["prepare-tab"].addEventListener("click", prepareTab);
      els["load-recent"].addEventListener("click", loadRecentRows);
      els["annotation-form"].addEventListener("submit", appendAnnotation);
      els["clear-form"].addEventListener("click", () => els["annotation-form"].reset());
    }

    function loadConfig() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveConfig() {
      const config = currentConfig();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      tokenClient = null;
      showMessage("Config saved in this browser.", "ok");
    }

    function currentConfig() {
      return {
        clientId: els["client-id"].value.trim(),
        spreadsheetId: els["spreadsheet-id"].value.trim() || SPREADSHEET_ID,
        tabName: els["tab-name"].value.trim() || "Annotations"
      };
    }

    function signIn() {
      saveConfig();
      const config = currentConfig();
      if (!config.clientId) {
        showMessage("OAuth client ID is required before Google sign-in.", "error");
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        showMessage("Google Identity Services did not load. Open this page from GitHub Pages or localhost.", "error");
        return;
      }
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: config.clientId,
          scope: SCOPE,
          callback: (response) => {
            if (response.error) {
              showMessage(response.error, "error");
              return;
            }
            accessToken = response.access_token;
            els.status.textContent = "Connected";
            els.status.className = "status ok";
            showMessage("Signed in. Google will use this user's permission to write the sheet.", "ok");
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    }

    async function prepareTab() {
      try {
        requireToken();
        const config = currentConfig();
        const metadata = await sheetsFetch("?fields=sheets(properties(title))");
        const tabs = new Set((metadata.sheets || []).map((sheet) => sheet.properties.title));
        if (!tabs.has(config.tabName)) {
          await sheetsFetch(":batchUpdate", {
            method: "POST",
            body: JSON.stringify({
              requests: [{ addSheet: { properties: { title: config.tabName } } }]
            })
          });
        }
        await updateValues(`${quoteSheet(config.tabName)}!A1:I1`, [HEADERS]);
        showMessage(`Tab ready: ${config.tabName}`, "ok");
      } catch (error) {
        showMessage(error.message, "error");
      }
    }

    async function appendAnnotation(event) {
      event.preventDefault();
      try {
        requireToken();
        const config = currentConfig();
        const row = [
          new Date().toISOString(),
          els["article-link"].value.trim(),
          els["clean-text"].value.trim(),
          els.question.value.trim(),
          els.answer.value.trim(),
          els.evidence.value.trim(),
          els.notes.value.trim(),
          els.starred.checked ? "TRUE" : "",
          ""
        ];
        await appendValues(config.tabName, row);
        showMessage("Row appended to Google Sheets.", "ok");
        await loadRecentRows();
      } catch (error) {
        showMessage(error.message, "error");
      }
    }

    async function loadRecentRows() {
      try {
        requireToken();
        const config = currentConfig();
        const data = await sheetsFetch(`/values/${encodeURIComponent(`${quoteSheet(config.tabName)}!A2:I200`)}`);
        const rows = data.values || [];
        renderRows(rows.slice(-50).reverse());
        showMessage(`Loaded ${rows.length} row(s).`, "ok");
      } catch (error) {
        showMessage(error.message, "error");
      }
    }

    async function sheetsFetch(path, options = {}) {
      const config = currentConfig();
      const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${config.spreadsheetId}${path}`, {
        ...options,
        headers: {
          Authorization: `Bearer ${accessToken}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      const body = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(body.error && body.error.message ? body.error.message : response.statusText);
      }
      return body;
    }

    function appendValues(tabName, row) {
      const range = `${quoteSheet(tabName)}!A1`;
      return sheetsFetch(`/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, {
        method: "POST",
        body: JSON.stringify({ values: [row] })
      });
    }

    function updateValues(range, values) {
      return sheetsFetch(`/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
        method: "PUT",
        body: JSON.stringify({ values })
      });
    }

    function renderRows(rows) {
      els["recent-rows"].innerHTML = rows.map((row) => `
        <tr>
          <td>${escapeHtml(row[0] || "")}</td>
          <td>${escapeHtml(row[1] || "")}</td>
          <td>${escapeHtml(row[3] || "")}</td>
          <td>${escapeHtml(row[4] || "")}</td>
          <td>${escapeHtml(row[5] || "")}</td>
          <td>${escapeHtml(row[6] || "")}</td>
          <td>${escapeHtml(row[7] || "")}</td>
        </tr>
      `).join("");
    }

    function requireToken() {
      if (!accessToken) {
        throw new Error("Sign in with Google first.");
      }
    }

    function showMessage(message, level) {
      els.message.textContent = message;
      els.message.style.borderLeftColor = level === "ok" ? "var(--green)" : level === "error" ? "var(--red)" : "var(--amber)";
      if (level === "error") {
        els.status.textContent = "Setup needed";
        els.status.className = "status error";
      }
    }

    function quoteSheet(name) {
      return `'${String(name).replace(/'/g, "''")}'`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
